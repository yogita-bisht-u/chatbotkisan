<!DOCTYPE html>
<html lang="hi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krishi Sahayak</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #dfe8d9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .mobile {
      width: 390px;
      height: 820px;
      background: #eef2ea;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #08a11d;
      padding: 18px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-box {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
    }

    .title h1 {
      font-size: 20px;
    }

    .title p {
      font-size: 13px;
      margin-top: 3px;
    }

    select {
      padding: 8px 12px;
      border: none;
      border-radius: 20px;
      font-size: 15px;
      outline: none;
      cursor: pointer;
    }

    .chat-area {
      flex: 1;
      padding: 18px;
      overflow-y: auto;
    }

    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
    }

    .bot-icon {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: white;
      border: 2px solid #c5e8c8;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
    }

    .message {
      background: white;
      padding: 18px;
      border-radius: 20px;
      max-width: 260px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      line-height: 1.8;
      font-size: 17px;
    }

    .time {
      text-align: right;
      font-size: 13px;
      color: gray;
      margin-top: 8px;
    }

    .user-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .user-message {
      background: #08a11d;
      color: white;
      padding: 14px 18px;
      border-radius: 18px;
      max-width: 260px;
      font-size: 16px;
      line-height: 1.6;
    }

    .bottom {
      padding: 14px;
      background: #f4f4f1;
    }

    .input-box {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-area {
      flex: 1;
      background: white;
      border-radius: 30px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.08);
    }

    .input-area input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 16px;
      background: transparent;
    }

    .mic {
      margin-left: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    .send-btn {
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 50%;
      background: #08b624;
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: 0.3s;
    }

    .send-btn:hover {
      transform: scale(1.05);
    }

    .features {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .card {
      flex: 1;
      background: white;
      border-radius: 18px;
      padding: 12px 8px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .card .icon {
      font-size: 26px;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 14px;
      font-weight: bold;
    }

    @media(max-width:450px) {
      .mobile {
        width: 100%;
        height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>

<body>

  <div class="mobile">

    <div class="header">

      <div class="logo-box">
        <div class="logo">🌾</div>

        <div class="title">
          <h1>Krishi Sahayak</h1>
          <p id="subtitle">आपका कृषि सहायक</p>
        </div>
      </div>

      <select id="language">
        <option value="hi">हिंदी</option>
        <option value="en">English</option>
      </select>

    </div>

    <div class="chat-area" id="chatArea">

      <div class="message-row">

        <div class="bot-icon">🤖</div>

        <div class="message" id="welcomeMessage">
          नमस्ते! 👋 <br><br>
          मैं आपका कृषि सहायक हूँ। <br><br>
          मैं आपकी कैसे मदद कर सकता हूँ?

          <div class="time">10:30 AM</div>
        </div>

      </div>

    </div>

    <div class="bottom">

      <div class="input-box">

        <div class="input-area">
          <input type="text" id="userInput" placeholder="अपना सवाल पूछें...">
          <span class="mic">🎤</span>
        </div>

        <button class="send-btn" onclick="sendMessage()">➤</button>

      </div>

      <div class="features">

        <div class="card" onclick="quickReply('crop')">
          <div class="icon">🌱</div>
          <p id="cropText">फसल जानकारी</p>
        </div>

        <div class="card" onclick="quickReply('weather')">
          <div class="icon">⛅</div>
          <p id="weatherText">मौसम</p>
        </div>

        <div class="card" onclick="quickReply('disease')">
          <div class="icon">🐞</div>
          <p id="diseaseText">रोग पहचानें</p>
        </div>

        <div class="card" onclick="quickReply('contact')">
          <div class="icon">📞</div>
          <p id="contactText">संपर्क</p>
        </div>

      </div>

    </div>

  </div>

  <script>

    const language = document.getElementById("language");

    const translations = {
      hi: {
        subtitle: "आपका कृषि सहायक",
        welcome: "नमस्ते! 👋 <br><br>मैं आपका कृषि सहायक हूँ। <br><br>मैं आपकी कैसे मदद कर सकता हूँ?",
        placeholder: "अपना सवाल पूछें...",
        crop: "फसल जानकारी",
        weather: "मौसम",
        disease: "रोग पहचानें",
        contact: "संपर्क"
      },

      en: {
        subtitle: "Your Farming Assistant",
        welcome: "Hello! 👋 <br><br>I am your farming assistant. <br><br>How can I help you?",
        placeholder: "Ask your question...",
        crop: "Crop Info",
        weather: "Weather",
        disease: "Disease Check",
        contact: "Contact"
      }
    };

    language.addEventListener("change", () => {

      const lang = language.value;

      document.getElementById("subtitle").innerHTML =
        translations[lang].subtitle;

      document.getElementById("welcomeMessage").innerHTML =
        translations[lang].welcome +
        `<div class="time">10:30 AM</div>`;

      document.getElementById("userInput").placeholder =
        translations[lang].placeholder;

      document.getElementById("cropText").innerHTML =
        translations[lang].crop;

      document.getElementById("weatherText").innerHTML =
        translations[lang].weather;

      document.getElementById("diseaseText").innerHTML =
        translations[lang].disease;

      document.getElementById("contactText").innerHTML =
        translations[lang].contact;

    });

    function sendMessage() {

      const input = document.getElementById("userInput");
      const message = input.value.trim();

      if (message === "") return;

      const chatArea = document.getElementById("chatArea");

      const userRow = document.createElement("div");
      userRow.className = "user-row";

      userRow.innerHTML = `
        <div class="user-message">${message}</div>
      `;

      chatArea.appendChild(userRow);

      input.value = "";

      setTimeout(() => {

        let reply = "";

        if (message.includes("गेहूं") || message.includes("crop")) {

          reply = `
          🌾 गेहूं की फसल के लिए खाद जानकारी:<br><br>
          ✅ DAP - 50kg प्रति एकड़<br>
          ✅ यूरिया - 50kg<br>
          ✅ जैविक खाद का उपयोग करें।
          `;

        } else if (message.includes("मौसम") || message.includes("weather")) {

          reply = `
          ⛅ आज मौसम साफ रहेगा।<br><br>
          🌡 तापमान: 28°C<br>
          💧 नमी: 60%
          `;

        } else if (message.includes("रोग") || message.includes("disease")) {

          reply = `
          🐞 सामान्य रोग:<br><br>
          ✅ पत्ती धब्बा रोग<br>
          ✅ झुलसा रोग
          `;

        } else if (message.includes("संपर्क") || message.includes("contact")) {

          reply = `
          📞 हेल्पलाइन: 1800-180-1551
          `;

        } else {

          reply = `
          🌱 आपका संदेश प्राप्त हो गया है।
          `;
        }

        const botRow = document.createElement("div");
        botRow.className = "message-row";

        botRow.innerHTML = `
          <div class="bot-icon">🤖</div>

          <div class="message">
            ${reply}

            <div class="time">
              ${new Date().toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit'
          })}
            </div>
          </div>
        `;

        chatArea.appendChild(botRow);

        chatArea.scrollTop = chatArea.scrollHeight;

      }, 500);

    }

    document.getElementById("userInput")
      .addEventListener("keypress", function (e) {

        if (e.key === "Enter") {
          sendMessage();
        }

      });

    function quickReply(type) {

      const lang = language.value;

      let text = "";

      if (type === "crop") {
        text = lang === "hi"
          ? "गेहूं की फसल जानकारी"
          : "Crop information";
      }

      else if (type === "weather") {
        text = lang === "hi"
          ? "आज का मौसम"
          : "Today's weather";
      }

      else if (type === "disease") {
        text = lang === "hi"
          ? "फसल रोग"
          : "Crop disease";
      }

      else if (type === "contact") {
        text = lang === "hi"
          ? "संपर्क जानकारी"
          : "Contact information";
      }

      document.getElementById("userInput").value = text;

      sendMessage();
    }

  </script>

</body>

</html>
